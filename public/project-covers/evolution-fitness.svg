<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Evolution Fitness computer vision workout dashboard</title>
  <desc id="desc">A clean fitness analysis interface with pose tracking lines, progress cards, and workout metrics.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset=".52" stop-color="#dbeafe"/>
      <stop offset="1" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".94"/>
      <stop offset="1" stop-color="#f8fafc" stop-opacity=".76"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#1d4ed8" flood-opacity=".16"/>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0v44" fill="none" stroke="#2563eb" stroke-opacity=".1"/>
    </pattern>
  </defs>
  <rect width="960" height="600" rx="44" fill="url(#bg)"/>
