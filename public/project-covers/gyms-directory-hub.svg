  <text x="640" y="390" fill="#0f172a" font-family="Inter, sans-serif" font-size="18" font-weight="700">Metro Gym</text>
  <text x="640" y="415" fill="#64748b" font-family="Inter, sans-serif" font-size="12">Sauna and pool facilities</text>
  <rect x="640" y="435" width="70" height="24" rx="12" fill="#dbeafe"/>
  <text x="652" y="451" fill="#1e40af" font-family="Inter, sans-serif" font-size="11" font-weight="700">Blimbing</text>
</svg>
