<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Indonesian Gyms Parallax Directory Hub</title>
  <desc id="desc">A digital showcase containing 20 gym landing pages, featuring clean cards, maps, and parallax features.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f5f3ff"/>
      <stop offset=".5" stop-color="#e0e7ff"/>
      <stop offset="1" stop-color="#dbeafe"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#4f46e5" flood-opacity=".12"/>
    </filter>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0v40" fill="none" stroke="#4f46e5" stroke-opacity=".06"/>
    </pattern>
  </defs>
  <rect width="960" height="600" rx="44" fill="url(#bg)"/>
  <rect width="960" height="600" rx="44" fill="url(#grid)"/>
  <rect x="80" y="80" width="800" height="440" rx="24" fill="#ffffff" filter="url(#shadow)"/>
  <rect x="80" y="80" width="800" height="50" rx="24" fill="#f8fafc"/>
  <circle cx="120" cy="105" r="8" fill="#ef4444"/>
  <circle cx="144" cy="105" r="8" fill="#eab308"/>
  <circle cx="168" cy="105" r="8" fill="#22c55e"/>
  <rect x="200" y="90" width="560" height="30" rx="15" fill="#f1f5f9"/>
  <text x="220" y="110" fill="#64748b" font-family="Inter, sans-serif" font-size="12">project-xc6z6.vercel.app/gyms</text>
  <text x="120" y="180" fill="#0f172a" font-family="Inter, sans-serif" font-size="28" font-weight="800">Malang Gyms Directory</text>
  <text x="120" y="210" fill="#64748b" font-family="Inter, sans-serif" font-size="14" font-weight="500">Compare 20 local fitness centers, facilities, &amp; locations</text>
  <rect x="120" y="250" width="220" height="230" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="120" y="250" width="220" height="110" rx="16" fill="url(#card-grad)"/>
  <path d="M210 325l40-40" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <path d="M220 295l30 30" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <path d="M200 315l30 30" stroke="#ffffff" stroke-width="8" stroke-linecap="round"/>
  <text x="140" y="390" fill="#0f172a" font-family="Inter, sans-serif" font-size="18" font-weight="700">Evolution Fitness</text>
  <text x="140" y="415" fill="#64748b" font-family="Inter, sans-serif" font-size="12">Pose tracking, feedback</text>
  <rect x="140" y="435" width="70" height="24" rx="12" fill="#dbeafe"/>
  <text x="152" y="451" fill="#1e40af" font-family="Inter, sans-serif" font-size="11" font-weight="700">Malang</text>
  <rect x="370" y="250" width="220" height="230" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="370" y="250" width="220" height="110" rx="16" fill="#1e1b4b"/>
  <path d="M430 330c30-50 70-50 100 0" fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round"/>
  <path d="M410 310c40-30 80-30 120 0" fill="none" stroke="#818cf8" stroke-width="6" stroke-linecap="round"/>
  <text x="390" y="390" fill="#0f172a" font-family="Inter, sans-serif" font-size="18" font-weight="700">Titanium Gym</text>
  <text x="390" y="415" fill="#64748b" font-family="Inter, sans-serif" font-size="12">Premium workout gear</text>
  <rect x="390" y="435" width="70" height="24" rx="12" fill="#dbeafe"/>
  <text x="402" y="451" fill="#1e40af" font-family="Inter, sans-serif" font-size="11" font-weight="700">Klojen</text>
  <rect x="620" y="250" width="220" height="230" rx="16" fill="#f8fafc" stroke="#e2e8f0" stroke-width="2"/>
  <rect x="620" y="250" width="220" height="110" rx="16" fill="#0369a1"/>
