<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Database Rental Game relational system</title>
  <desc id="desc">A relational database dashboard with connected tables, game inventory cards, and transaction records.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset=".5" stop-color="#e0f2fe"/>
      <stop offset="1" stop-color="#ede9fe"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e40af"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#0f172a" flood-opacity=".13"/>
    </filter>
  </defs>
  <rect width="960" height="600" rx="44" fill="url(#bg)"/>
  <rect x="72" y="72" width="816" height="456" rx="34" fill="#ffffff" fill-opacity=".86" filter="url(#shadow)"/>
  <rect x="112" y="116" width="300" height="368" rx="28" fill="url(#dark)"/>
  <rect x="150" y="158" width="224" height="54" rx="15" fill="#ffffff" fill-opacity=".12" stroke="#93c5fd" stroke-opacity=".45"/>
  <rect x="150" y="242" width="224" height="54" rx="15" fill="#ffffff" fill-opacity=".1" stroke="#93c5fd" stroke-opacity=".35"/>
  <rect x="150" y="326" width="224" height="54" rx="15" fill="#ffffff" fill-opacity=".1" stroke="#93c5fd" stroke-opacity=".35"/>
  <rect x="150" y="410" width="224" height="38" rx="13" fill="#38bdf8" fill-opacity=".85"/>
  <text x="174" y="191" fill="#e0f2fe" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">GAMES</text>
  <text x="174" y="275" fill="#e0f2fe" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">RENTALS</text>
  <text x="174" y="359" fill="#e0f2fe" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800">MEMBERS</text>
  <text x="174" y="435" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="900">PL/SQL LOGIC</text>
  <g stroke="#2563eb" stroke-width="4" stroke-linecap="round" stroke-opacity=".45">
    <path d="M412 185h80"/>
    <path d="M412 269h80"/>
    <path d="M412 353h80"/>
    <path d="M492 185v168"/>
  </g>
  <rect x="512" y="130" width="290" height="96" rx="24" fill="#eff6ff" stroke="#bfdbfe"/>
  <rect x="512" y="252" width="290" height="96" rx="24" fill="#f8fafc" stroke="#dbeafe"/>
  <rect x="512" y="374" width="290" height="96" rx="24" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="544" y="168" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Inventory status</text>
  <text x="544" y="290" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Rental transaction</text>
  <text x="544" y="412" fill="#0f172a" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="800">Member history</text>
  <g fill="#2563eb">
